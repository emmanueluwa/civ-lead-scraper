services:
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # scraper worker — parallel Google Places searches
  scraper-worker:
    build:
      context: .
      target: worker
    command: celery -A tasks worker --loglevel=info --concurrency=4 --queues=scraper
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - sqlite_data:/app/data

  # agent worker — research, email, monitor, follow ups, booking
  agent-worker:
    build:
      context: .
      target: worker
    command: celery -A tasks worker --loglevel=info --concurrency=2 --queues=agent
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - sqlite_data:/app/data

  # beat scheduler — triggers all scheduled tasks
  beat:
    build:
      context: .
      target: beat
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - sqlite_data:/app/data
      - beat_data:/app/beat

  # dashboard — FastAPI backend for the sales agent UI
  dashboard:
    build:
      context: .
      target: dashboard
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/data

  # scraper — run manually via docker compose run --rm scraper
  scraper:
    build:
      context: .
      target: scraper
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - sqlite_data:/app/data
    profiles:
      - run

volumes:
  redis_data:
  sqlite_data:
  beat_data:
